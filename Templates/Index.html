<!DOCTYPE html>
<html>
<head>
    <title>Goldilocks Tower</title>
    <style>
        body { background-color: #2c2424; font-family: sans-serif; display: flex; justify-content: center; }
        .tower { width: 300px; margin-top: 50px; }
        .floor { 
            background: #ffcc80; /* Warm/Cozy Orange */
            border: 4px solid #bf360c; 
            margin: 10px; 
            padding: 20px; 
            text-align: center; 
            cursor: pointer;
            transition: 0.3s;
        }
        .floor:hover { background: #ff9800; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="tower">
    {% for id, data in floors.items() %}
    <div class="floor" onclick="alert('Subject: {{ data.subject }}\nProgress: {{ data.progress }}%')">
        <h3>{{ data.subject }}</h3>
        <p>Status: {{ data.status }}</p>
    </div>
    {% endfor %}
</div>

</body>
</html>
