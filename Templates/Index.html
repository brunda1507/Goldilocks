<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #3e2723; color: #fff; font-family: 'Courier New', monospace; display: flex; }
        
        /* Sidebar Menu */
        #menu { width: 200px; background: #5d4037; height: 100vh; padding: 20px; }
        
        /* Tower Container */
        #main-view { flex-grow: 1; display: flex; justify-content: center; position: relative; }
        .tower { width: 300px; border-left: 10px solid #8d6e63; border-right: 10px solid #8d6e63; background: #263238; }
        
        /* Floor Styling */
        .floor { height: 80px; border-bottom: 4px solid #455a64; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #ffcc80; color: #5d4037; }
        .floor:hover { background: #ffb74d; }

        /* Overlay Goal */
        #goal-display { position: absolute; top: 20px; left: 20px; background: #bf360c; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="menu">
    <h2>Goldilocks</h2>
    <ul><li>Dashboard</li><li>History</li><li>Settings</li></ul>
</div>

<div id="main-view">
    <div id="goal-display">Current Goal: Loading...</div>
    <div class="tower">
        {% for id, data in floors.items() %}
        <div class="floor" onclick="alert('Subject: {{ data.subject }}')">
            {{ data.subject }}
        </div>
        {% endfor %}
    </div>
</div>

<script>
    // Prompt user for a goal on load
    window.onload = function() {
        let goal = prompt("What is your main goal for today?");
        if (goal) {
            document.getElementById('goal-display').innerText = "Goal: " + goal;
        }
    };
</script>
</body>
</html>
