<!DOCTYPE html>
<html>
<head>
    <title>Goldilocks</title>
    <style>
        body { background: #3e2723; color: #fff; font-family: 'Courier New', monospace; display: flex; }
        #menu { width: 200px; background: #5d4037; height: 100vh; padding: 20px; }
        #main-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        .tower { width: 300px; border-left: 10px solid #8d6e63; border-right: 10px solid #8d6e63; background: #263238; margin-top: 20px;}
        .floor { height: 80px; border-bottom: 4px solid #455a64; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #ffcc80; color: #5d4037; }
        .floor:hover { background: #ffb74d; }
        #goal-display { background: #bf360c; padding: 10px; border-radius: 5px; margin: 20px; }
    </style>
</head>
<body>

<div id="menu">
    <h2>Goldilocks</h2>
    <p id="user-display">Welcome, Guest</p>
    <ul><li>Dashboard</li><li>History</li><li>Settings</li></ul>
</div>

<div id="main-view">
    <div id="goal-display">Goal: Loading...</div>
    <h2>Your Floors</h2>
    <div class="tower">
        {% for id, data in floors.items() %}
        <div class="floor" onclick="alert('Floor {{ id }}: {{ data.subject }}\nProgress: {{ data.progress }}%')">
            {{ data.subject }}
        </div>
        {% endfor %}
    </div>
</div>

<script>
    window.onload = function() {
        // Prompt for User and Goal
        let username = prompt("Enter your username:");
        if (username) document.getElementById('user-display').innerText = "User: " + username;
        
        let goal = prompt("What is your main goal for today?");
        if (goal) document.getElementById('goal-display').innerText = "Goal: " + goal;
    };
</script>
</body>
</html>
